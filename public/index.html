<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHRTN — Link Shortener</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page-wrapper">

    <header class="site-header">
      <div class="logo">URL <span class="logo-dot">SHORTONA</span></div>
      <div class="tagline">brutally short links</div>
    </header>

    <main class="main">

      <div class="shorten-block">
        <div class="block-label">// ENTER URL</div>
        <div class="input-row">
          <input
            type="url"
            id="url-input"
            class="url-input"
            placeholder="https://your-very-long-link.com/goes/here"
            autocomplete="off"
            spellcheck="false"
          />
          <button id="shorten-btn" class="shorten-btn">SHORTEN</button>
        </div>
        <div id="error-msg" class="error-msg hidden">! INVALID URL — TRY AGAIN</div>
      </div>

      <div id="result-block" class="result-block hidden">
        <div class="block-label">// SHORT LINK READY</div>
        <div class="result-box">
          <div class="result-row">
            <div id="short-link" class="short-link"></div>
            <button id="copy-btn" class="copy-btn">COPY</button>
          </div>
          <div id="copy-feedback" class="copy-feedback hidden">✓ COPIED TO CLIPBOARD</div>
        </div>
      </div>

      <div id="loading-block" class="loading-block hidden">
        <div class="loading-text">SHORTENING<span class="dots"><span>.</span><span>.</span><span>.</span></span></div>
      </div>

    </main>

    <footer class="site-footer">
      <span>NO TRACKING. NO ADS. NO BS.</span>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
